<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - SchoolVibe AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <div class="nav-logo">BA</div>
                <div>
                    <div class="nav-title">BENEDICT ACADEMY</div>
                    <div class="nav-subtitle">Smart Attendance Tracker</div>
                </div>
            </a>
            
            <button class="mobile-menu-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="register.html" class="nav-link">Register</a></li>
                <li><a href="checkin.html" class="nav-link">Check-in</a></li>
                <li><a href="reports.html" class="nav-link active">Reports</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Attendance Reports</h1>
            <p class="page-description">View and export attendance data</p>
        </div>

        <div class="card" style="margin-bottom: 1.5rem;">
            <div class="grid-3">
                <div class="form-group">
                    <label class="form-label">Report Type</label>
                    <select id="reportType" class="form-select" onchange="updateReportOptions()">
                        <option value="daily">Daily Summary</option>
                        <option value="roster">Class Roster</option>
                        <option value="monthly">Monthly Report</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Class</label>
                    <select id="classSelect" class="form-select class-select" onchange="loadClassSessions()">
                        <option value="">Select a class</option>
                    </select>
                </div>
                
                <div class="form-group" id="sessionGroup">
                    <label class="form-label">Session</label>
                    <select id="sessionSelect" class="form-select">
                        <option value="">Select a session</option>
                    </select>
                </div>
                
                <div class="form-group hidden" id="dateRangeGroup" style="display: none;">
                    <label class="form-label">Date Range</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="date" id="startDate" class="form-input">
                        <input type="date" id="endDate" class="form-input">
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 1rem; text-align: right;">
                <button class="btn btn-primary" onclick="generateReport()">
                    Generate Report
                </button>
                <button class="btn btn-secondary" onclick="exportReport()">
                    Export CSV
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 class="card-title" id="reportTitle">Select options to generate report</h2>
                <span id="recordCount"></span>
            </div>
            
            <div class="table-container">
                <table class="data-table" id="reportTable">
                    <thead id="tableHead">
                        <tr>
                            <th>Select parameters above</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td style="text-align: center; color: #6b7280; padding: 3rem;">
                                No data to display
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        let currentReportData = [];
        
        function updateReportOptions() {
            const type = document.getElementById('reportType').value;
            const sessionGroup = document.getElementById('sessionGroup');
            const dateRangeGroup = document.getElementById('dateRangeGroup');
            
            if (type === 'monthly') {
                sessionGroup.style.display = 'none';
                dateRangeGroup.style.display = 'block';
                
                const today = new Date();
                const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
                document.getElementById('endDate').value = today.toISOString().split('T')[0];
                document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
            } else {
                sessionGroup.style.display = 'block';
                dateRangeGroup.style.display = 'none';
            }
        }
        
        async function loadClassSessions() {
            const classId = document.getElementById('classSelect').value;
            const sessionSelect = document.getElementById('sessionSelect');
            
            if (!classId) {
                sessionSelect.innerHTML = '<option value="">Select a session</option>';
                return;
            }
            
            try {
                const response = await api.getClass(classId);
                const sessions = response.data.sessions || [];
                
                sessionSelect.innerHTML = '<option value="">Select a session</option>';
                sessions.forEach(session => {
                    const option = document.createElement('option');
                    option.value = session.session_id;
                    option.textContent = `${session.session_date} (${session.start_time})`;
                    sessionSelect.appendChild(option);
                });
            } catch (error) {
                showToast('Failed to load sessions', 'error');
            }
        }
        
        async function generateReport() {
            const type = document.getElementById('reportType').value;
            const classId = document.getElementById('classSelect').value;
            
            const reportTitle = document.getElementById('reportTitle');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');
            
            try {
                let response;
                
                if (type === 'daily' || type === 'roster') {
                    const sessionId = document.getElementById('sessionSelect').value;
                    if (!sessionId) {
                        showToast('Please select a session', 'warning');
                        return;
                    }
                    
                    if (type === 'daily') {
                        response = await api.getDailyReport(sessionId);
                        currentReportData = response.data || [];
                        
                        reportTitle.textContent = `Daily Attendance Report`;
                        
                        tableHead.innerHTML = `
                            <tr>
                                <th>Class</th>
                                <th>Total</th>
                                <th>Present</th>
                                <th>Absent</th>
                                <th>Late</th>
                                <th>Attendance %</th>
                            </tr>
                        `;
                        
                        tableBody.innerHTML = currentReportData.map(row => `
                            <tr>
                                <td>${row.class_name || 'Unknown'}</td>
                                <td>${row.total || 0}</td>
                                <td style="color: #059669; font-weight: 600;">${row.present || 0}</td>
                                <td style="color: #dc2626;">${row.absent || 0}</td>
                                <td style="color: #d97706;">${row.late || 0}</td>
                                <td style="font-weight: 600;">${row.pct || 0}%</td>
                            </tr>
                        `).join('');
                        
                    } else {
                        response = await api.getRosterReport(sessionId);
                        currentReportData = response.data || [];
                        
                        reportTitle.textContent = `Class Roster - ${response.count || 0} students`;
                        
                        tableHead.innerHTML = `
                            <tr>
                                <th>Student ID</th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Check-in Time</th>
                            </tr>
                        `;
                        
                        tableBody.innerHTML = currentReportData.map(row => `
                            <tr>
                                <td>${row.student_id}</td>
                                <td>${row.name}</td>
                                <td><span class="badge badge-${row.status}">${row.status}</span></td>
                                <td>${row.timestamp ? formatTime(row.timestamp) : '-'}</td>
                            </tr>
                        `).join('');
                    }
                    
                } else if (type === 'monthly') {
                    if (!classId) {
                        showToast('Please select a class', 'warning');
                        return;
                    }
                    
                    const startDate = document.getElementById('startDate').value;
                    const endDate = document.getElementById('endDate').value;
                    
                    response = await api.getMonthlyReport(classId, { start_date: startDate, end_date: endDate });
                    const data = response.data;
                    
                    reportTitle.textContent = `Monthly Report - ${data.class_name || 'Class'}`;
                    
                    tableHead.innerHTML = `
                        <tr>
                            <th>Metric</th>
                            <th>Value</th>
                        </tr>
                    `;
                    
                    let html = `
                        <tr>
                            <td>Monthly Average Attendance</td>
                            <td style="font-size: 1.25rem; font-weight: 700; color: #059669;">
                                ${data.monthly_avg || 0}%
                            </td>
                        </tr>
                        <tr>
                            <td>Total Sessions</td>
                            <td>${data.total_sessions || 0}</td>
                        </tr>
                    `;
                    
                    if (data.daily_breakdown) {
                        html += data.daily_breakdown.map(day => `
                            <tr>
                                <td>${day.date}</td>
                                <td>${day.rate}%</td>
                            </tr>
                        `).join('');
                    }
                    
                    tableBody.innerHTML = html;
                    currentReportData = data.daily_breakdown || [];
                }
                
                document.getElementById('recordCount').textContent = 
                    `${Array.isArray(currentReportData) ? currentReportData.length : '1'} record(s)`;
                
            } catch (error) {
                showToast('Failed to generate report', 'error');
                console.error(error);
            }
        }
        
        function exportReport() {
            if (!currentReportData || currentReportData.length === 0) {
                showToast('No data to export', 'warning');
                return;
            }
            
            let csv = '';
            const type = document.getElementById('reportType').value;
            
            if (type === 'daily') {
                csv = 'Class,Total,Present,Absent,Late,Percentage\n';
                csv += currentReportData.map(r => 
                    `${r.class_name || 'Unknown'},${r.total || 0},${r.present || 0},${r.absent || 0},${r.late || 0},${r.pct || 0}`
                ).join('\n');
            } else if (type === 'roster') {
                csv = 'Student ID,Name,Status,Check-in Time\n';
                csv += currentReportData.map(r => 
                    `${r.student_id},"${r.name}",${r.status},${r.timestamp || ''}`
                ).join('\n');
            } else if (type === 'monthly') {
                csv = 'Date,Attendance Rate\n';
                csv += currentReportData.map(r => 
                    `${r.date},${r.rate}`
                ).join('\n');
            }
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `attendance-report-${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            
            showToast('Report exported successfully', 'success');
        }
    </script>
    <script src="js/login.js"></script>
    <script>
        // Require authentication on this page (teachers, admin can view reports)
        requireRole('admin', 'teacher');
    </script>
</body>
</html>
