<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - SchoolVibe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --dark-900: #111827;
            --dark-800: #1f2937;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-900) 0%, #1a1a2e 100%);
            color: var(--white);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-link {
            color: #9ca3af;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link.active {
            color: var(--primary);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: #9ca3af;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #9ca3af;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            color: var(--white);
            font-family: 'Inter', sans-serif;
        }

        input::placeholder, textarea::placeholder {
            color: #9ca3af;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">SchoolVibe</a>
            <ul class="nav-links">
                <li><a href="teacher-dashboard.html" class="nav-link active">Dashboard</a></li>
                <li><a href="index.html" class="nav-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="header">
            <h1>Teacher Dashboard</h1>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="assignments">Assignments</button>
            <button class="tab" data-tab="attendance">Attendance</button>
            <button class="tab" data-tab="grades">Grades</button>
        </div>

        <!-- Assignments Tab -->
        <div id="assignments-tab" class="tab-content">
            <button class="btn" id="newAssignmentBtn" style="margin-bottom: 2rem;">+ New Assignment</button>
            <div id="assignmentsContainer">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Attendance Tab -->
        <div id="attendance-tab" class="tab-content" style="display: none;">
            <div class="card">
                <h3 style="margin-bottom: 1rem;">Select Session</h3>
                <select id="sessionSelect" style="margin-bottom: 1rem;">
                    <option>Loading sessions...</option>
                </select>
                <button class="btn">Generate Report</button>
            </div>
            <div id="attendanceContainer" style="margin-top: 2rem;">
                <!-- Report populated by JS -->
            </div>
        </div>

        <!-- Grades Tab -->
        <div id="grades-tab" class="tab-content" style="display: none;">
            <div class="card">
                <h3 style="margin-bottom: 1rem;">Add Student Grade</h3>
                <div class="form-group">
                    <label>Student</label>
                    <select id="studentSelect">
                        <option>Loading students...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Enter subject">
                </div>
                <div class="form-group">
                    <label>Grade</label>
                    <input type="text" id="grade" placeholder="Enter grade (A, B, C, etc.)">
                </div>
                <button class="btn">Add Grade</button>
            </div>
        </div>
    </div>

    <!-- Assignment Modal -->
    <div id="assignmentModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; justify-content: center; align-items: center;">
        <div class="card" style="width: 90%; max-width: 500px;">
            <h2 style="margin-bottom: 1.5rem;">Create Assignment</h2>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="assignmentTitle" placeholder="Assignment title">
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="assignmentDueDate">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="assignmentDescription" rows="4" placeholder="Assignment description"></textarea>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button class="btn" id="saveAssignmentBtn" style="flex: 1;">Save</button>
                <button class="btn" id="closeModalBtn" style="flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
                e.target.classList.add('active');
                const tabName = e.target.dataset.tab;
                document.getElementById(`${tabName}-tab`).style.display = 'block';
            });
        });

        // Load assignments
        async function loadAssignments() {
            try {
                const res = await fetch('/api/teacher/assignments');
                const assignments = await res.json();
                const container = document.getElementById('assignmentsContainer');
                
                container.innerHTML = assignments.map(a => `
                    <div class="card">
                        <h3>${a.title}</h3>
                        <p style="color: #9ca3af; margin-top: 0.5rem;">Due: ${new Date(a.due_date).toLocaleDateString()}</p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading assignments:', error);
            }
        }

        loadAssignments();

        // New Assignment Button
        document.getElementById('newAssignmentBtn').addEventListener('click', () => {
            document.getElementById('assignmentModal').style.display = 'flex';
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('assignmentModal').style.display = 'none';
        });
    </script>
</body>
</html>
