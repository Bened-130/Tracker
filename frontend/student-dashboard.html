<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchoolVibe - Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark-900: #111827;
            --dark-800: #1f2937;
            --dark-700: #374151;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-900) 0%, #1a1a2e 100%);
            color: var(--white);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--white);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-link {
            color: #9ca3af;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #9ca3af;
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: #9ca3af;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .tab:hover {
            color: var(--primary);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .card .value {
            font-size: 2rem;
            font-weight: 700;
        }

        .card .subtitle {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 1rem;
                font-size: 0.875rem;
            }

            .header h1 {
                font-size: 1.875rem;
            }

            .grid-layout {
                grid-template-columns: 1fr;
            }

            .tabs {
                gap: 0.5rem;
                overflow-x: auto;
            }

            .tab {
                padding: 0.5rem 1rem;
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">SchoolVibe</a>
            <ul class="nav-links">
                <li><a href="student-dashboard.html" class="nav-link active">Dashboard</a></li>
                <li><a href="student-checkin.html" class="nav-link">Check-in</a></li>
                <li><a href="index.html" class="nav-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-container">
        <div class="header">
            <h1>Academic Dashboard</h1>
            <p id="greetingMessage">Welcome back!</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="results">My Grades</button>
            <button class="tab" data-tab="assignments">Assignments</button>
            <button class="tab" data-tab="timetable">Timetable</button>
            <button class="tab" data-tab="fees">Fees</button>
        </div>

        <!-- Results Tab -->
        <div id="results-tab" class="tab-content">
            <div class="grid-layout" id="resultsGrid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Assignments Tab -->
        <div id="assignments-tab" class="tab-content tab-content-hidden">
            <div class="grid-layout" id="assignmentsGrid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Timetable Tab -->
        <div id="timetable-tab" class="tab-content tab-content-hidden">
            <div class="grid-layout" id="timetableGrid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Fees Tab -->
        <div id="fees-tab" class="tab-content tab-content-hidden">
            <div class="grid-layout" id="feesGrid">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
    <script src="js/studentDashboard.js"></script>
    <script>
        // Require Student role for this page
        requireRole('student');
    </script>
</body>
</html>
