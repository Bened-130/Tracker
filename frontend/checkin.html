<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in - BENEDICT ACADEMY</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <div class="nav-logo">BA</div>
                <div>
                    <div class="nav-title">SchoolVibe AI</div>
                    <div class="nav-subtitle">Smart Attendance Tracker</div>
                </div>
            </a>
            
            <button class="mobile-menu-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="register.html" class="nav-link">Register</a></li>
                <li><a href="checkin.html" class="nav-link active">Check-in</a></li>
                <li><a href="reports.html" class="nav-link">Reports</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Face Check-in</h1>
            <p class="page-description">Look at the camera to mark your attendance</p>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">Camera</h2>
                    <span class="badge badge-present" id="statusBadge">Ready</span>
                </div>
                
                <div class="camera-container card-margin-bottom">
                    <video 
                        id="video" 
                        class="camera-video" 
                        autoplay 
                        muted
                    ></video>
                    <canvas 
                        id="overlay" 
                        class="camera-overlay"
                    ></canvas>
                    <div class="scan-line hidden" id="scanLine"></div>
                    
                    <div class="camera-controls">
                        <span class="camera-badge" id="matchStatus">Click Start Check-in</span>
                    </div>
                </div>
                
                <div class="button-group-row">
                    <button type="button" id="startBtn" class="btn btn-primary" onclick="startCheckIn()">
                        Start Check-in
                    </button>
                    <button type="button" id="stopBtn" class="btn btn-secondary" onclick="stopCheckIn()" disabled>
                        Stop
                    </button>
                </div>
            </div>

            <div>
                <div class="card card-margin-bottom">
                    <h2 class="card-title">Select Session</h2>
                    
                    <div class="form-group">
                        <label class="form-label">Class</label>
                        <select id="classSelect" class="form-select class-select" title="Select class" onchange="loadSessions()">
                            <option value="">Select a class</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Session</label>
                        <select id="sessionSelect" class="form-select" title="Select session" disabled>
                            <option value="">Select a session</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">✓ Recent Check-ins</h2>
                    <div id="recentCheckins" class="recent-checkins">
                        <p class="recent-checkins-empty">
                            No check-ins yet today
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/faceRecognition.js"></script>
    
    <script>
        let stream = null;
        let isChecking = false;
        let checkInterval = null;
        let lastCheckTime = 0;
        
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusBadge = document.getElementById('statusBadge');
        const matchStatus = document.getElementById('matchStatus');
        
        async function loadSessions() {
            const classId = document.getElementById('classSelect').value;
            const sessionSelect = document.getElementById('sessionSelect');
            
            if (!classId) {
                sessionSelect.disabled = true;
                sessionSelect.innerHTML = '<option value="">Select a session</option>';
                return;
            }
            
            try {
                const response = await api.getClass(classId);
                const sessions = response.data.sessions || [];
                
                const today = new Date().toISOString().split('T')[0];
                const relevantSessions = sessions.filter(s => s.session_date >= today);
                
                sessionSelect.innerHTML = '<option value="">Select a session</option>';
                relevantSessions.forEach(session => {
                    const option = document.createElement('option');
                    option.value = session.session_id;
                    option.textContent = `${session.session_date} (${session.start_time} - ${session.end_time})`;
                    sessionSelect.appendChild(option);
                });
                
                sessionSelect.disabled = false;
                
            } catch (error) {
                showToast('Failed to load sessions', 'error');
            }
        }
        
        async function startCheckIn() {
            const sessionId = document.getElementById('sessionSelect').value;
            
            if (!sessionId) {
                showToast('Please select a session first', 'warning');
                return;
            }
            
            try {
                matchStatus.textContent = 'Starting camera...';
                
                // Start camera
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    },
                    audio: false
                });
                
                video.srcObject = stream;
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => resolve();
                });
                await video.play();
                
                // Set canvas size
                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;
                
                // Load models
                matchStatus.textContent = 'Loading AI models...';
                await faceService.loadModels();
                
                // Start detection loop
                isChecking = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                document.getElementById('scanLine').style.display = 'block';
                statusBadge.textContent = 'Scanning';
                statusBadge.className = 'badge badge-late';
                matchStatus.textContent = 'Looking for face...';
                
                // Run detection every 1.5 seconds
                checkInterval = setInterval(detectAndCheckIn, 1500);
                
                showToast('Check-in started. Look at the camera.', 'success');
                
            } catch (error) {
                console.error('Check-in error:', error);
                showToast('Failed to start: ' + error.message, 'error');
                matchStatus.textContent = 'Error - try again';
            }
        }
        
        async function detectAndCheckIn() {
            if (!isChecking) return;
            
            // Prevent overlapping calls
            const now = Date.now();
            if (now - lastCheckTime < 1000) return;
            lastCheckTime = now;
            
            try {
                const detection = await faceService.detectFace(video);
                const ctx = overlay.getContext('2d');
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                
                if (!detection) {
                    matchStatus.textContent = 'No face detected - move closer';
                    return;
                }
                
                // Draw face box
                faceService.drawDetection(overlay, detection, 'Scanning...');
                matchStatus.textContent = 'Face found - processing...';
                
                const sessionId = document.getElementById('sessionSelect').value;
                
                // Call API to mark attendance
                const response = await api.markAttendance(
                    sessionId,
                    Array.from(detection.descriptor)
                );
                
                // Success!
                faceService.drawDetection(overlay, detection, response.data.name);
                matchStatus.textContent = `✓ ${response.data.name} checked in!`;
                statusBadge.textContent = 'Success';
                statusBadge.className = 'badge badge-present';
                
                addRecentCheckin(response.data);
                
                // Auto-stop after success
                setTimeout(stopCheckIn, 2000);
                
            } catch (error) {
                console.error('Detection error:', error);
                
                if (error.message.includes('already')) {
                    matchStatus.textContent = 'Already checked in today';
                    statusBadge.textContent = 'Duplicate';
                } else if (error.message.includes('No matching')) {
                    matchStatus.textContent = 'Face not recognized';
                    statusBadge.textContent = 'Unknown';
                } else {
                    matchStatus.textContent = 'Error - will retry';
                }
            }
        }
        
        function addRecentCheckin(data) {
            const container = document.getElementById('recentCheckins');
            
            if (container.querySelector('p')) {
                container.innerHTML = '';
            }
            
            const item = document.createElement('div');
            item.style.cssText = 'display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: #f0fdf4; border-radius: 0.5rem; border-left: 4px solid #10b981; animation: slideIn 0.3s ease;';
            item.innerHTML = `
                <div style="width: 40px; height: 40px; background: #d1fae5; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem;">
                    ✓
                </div>
                <div style="flex: 1;">
                    <div style="font-weight: 600;">${data.name}</div>
                    <div style="font-size: 0.75rem; color: #6b7280;">
                        ${new Date(data.timestamp).toLocaleTimeString()}
                    </div>
                </div>
                <span class="badge badge-${data.status}">${data.status}</span>
            `;
            
            container.insertBefore(item, container.firstChild);
            
            while (container.children.length > 5) {
                container.removeChild(container.lastChild);
            }
        }
        
        function stopCheckIn() {
            isChecking = false;
            
            if (checkInterval) {
                clearInterval(checkInterval);
                checkInterval = null;
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            document.getElementById('scanLine').style.display = 'none';
            statusBadge.textContent = 'Ready';
            statusBadge.className = 'badge badge-present';
            matchStatus.textContent = 'Click Start Check-in';
        }
        
        window.addEventListener('beforeunload', stopCheckIn);
    </script>
    <script src="js/login.js"></script>
    <script>
        // Require authentication on this page
        requireAuth();
    </script>
</body>
</html>
