<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in - SchoolVibe AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <div class="nav-logo">📚</div>
                <div>
                    <div class="nav-title">SchoolVibe AI</div>
                    <div class="nav-subtitle">Smart Attendance Tracker</div>
                </div>
            </a>
            
            <button class="mobile-menu-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="register.html" class="nav-link">Register</a></li>
                <li><a href="checkin.html" class="nav-link active">Check-in</a></li>
                <li><a href="reports.html" class="nav-link">Reports</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Face Check-in</h1>
            <p class="page-description">Look at the camera to mark your attendance</p>
        </div>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">📷 Camera</h2>
                    <span class="badge badge-present" id="statusBadge">Ready</span>
                </div>
                
                <div class="camera-container" style="margin-bottom: 1rem;">
                    <video id="video" class="camera-video" autoplay playsinline></video>
                    <canvas id="overlay" class="camera-overlay"></canvas>
                    <div class="scan-line" id="scanLine"></div>
                    
                    <div class="camera-controls">
                        <span class="camera-badge" id="matchStatus">Waiting for face...</span>
                    </div>
                </div>
                
                <div style="display: flex; gap: 0.75rem;">
                    <button type="button" class="btn btn-primary" onclick="startCheckIn()">
                        Start Check-in
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="stopCheckIn()">
                        Stop
                    </button>
                </div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 1.5rem;">
                    <h2 class="card-title">📅 Select Session</h2>
                    
                    <div class="form-group">
                        <label class="form-label">Class</label>
                        <select id="classSelect" class="form-select class-select" onchange="loadSessions()">
                            <option value="">Select a class</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Session</label>
                        <select id="sessionSelect" class="form-select" disabled>
                            <option value="">Select a session</option>
                        </select>
                    </div>
                </div>

                <div class="card">
                    <h2 class="card-title">✓ Recent Check-ins</h2>
                    <div id="recentCheckins" style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <p style="color: #6b7280; text-align: center; padding: 1rem;">
                            No check-ins yet today
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/faceRecognition.js"></script>
    
    <script>
        let stream = null;
        let isChecking = false;
        let checkInInterval = null;
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        
        async function loadSessions() {
            const classId = document.getElementById('classSelect').value;
            const sessionSelect = document.getElementById('sessionSelect');
            
            if (!classId) {
                sessionSelect.disabled = true;
                sessionSelect.innerHTML = '<option value="">Select a session</option>';
                return;
            }
            
            try {
                const response = await api.getClass(classId);
                const sessions = response.data.sessions || [];
                
                const today = new Date().toISOString().split('T')[0];
                const relevantSessions = sessions.filter(s => s.session_date >= today);
                
                sessionSelect.innerHTML = '<option value="">Select a session</option>';
                relevantSessions.forEach(session => {
                    const option = document.createElement('option');
                    option.value = session.session_id;
                    option.textContent = `${session.session_date} (${session.start_time} - ${session.end_time})`;
                    sessionSelect.appendChild(option);
                });
                
                sessionSelect.disabled = false;
                
            } catch (error) {
                showToast('Failed to load sessions', 'error');
            }
        }
        
        async function startCheckIn() {
            const sessionId = document.getElementById('sessionSelect').value;
            
            if (!sessionId) {
                showToast('Please select a session first', 'warning');
                return;
            }
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' },
                    audio: false
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    isChecking = true;
                    document.getElementById('statusBadge').textContent = 'Scanning';
                    document.getElementById('statusBadge').className = 'badge badge-late';
                    
                    checkInInterval = setInterval(detectAndCheckIn, 1000);
                    showToast('Check-in started. Look at the camera.', 'success');
                };
                
            } catch (error) {
                showToast('Camera access denied', 'error');
            }
        }
        
        async function detectAndCheckIn() {
            if (!isChecking) return;
            
            const detection = await faceService.detectFace(video);
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            
            if (!detection) {
                document.getElementById('matchStatus').textContent = 'No face detected';
                return;
            }
            
            faceService.drawDetection(overlay, detection);
            document.getElementById('matchStatus').textContent = 'Face detected - processing...';
            
            const sessionId = document.getElementById('sessionSelect').value;
            
            try {
                const response = await api.markAttendance(
                    sessionId,
                    Array.from(detection.descriptor)
                );
                
                faceService.drawDetection(overlay, detection, response.data.name);
                document.getElementById('matchStatus').textContent = `✓ ${response.data.name} checked in!`;
                document.getElementById('statusBadge').textContent = 'Success';
                document.getElementById('statusBadge').className = 'badge badge-present';
                
                addRecentCheckin(response.data);
                
                setTimeout(stopCheckIn, 2000);
                
            } catch (error) {
                if (error.message.includes('already')) {
                    document.getElementById('matchStatus').textContent = 'Already checked in';
                } else if (error.message.includes('No matching')) {
                    document.getElementById('matchStatus').textContent = 'Face not recognized';
                } else {
                    document.getElementById('matchStatus').textContent = 'Error - try again';
                }
            }
        }
        
        function addRecentCheckin(data) {
            const container = document.getElementById('recentCheckins');
            
            if (container.querySelector('p')) {
                container.innerHTML = '';
            }
            
            const item = document.createElement('div');
            item.style.cssText = 'display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: #f0fdf4; border-radius: 0.5rem; border-left: 4px solid #10b981;';
            item.innerHTML = `
                <div style="width: 40px; height: 40px; background: #d1fae5; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                    ✓
                </div>
                <div style="flex: 1;">
                    <div style="font-weight: 600;">${data.name}</div>
                    <div style="font-size: 0.75rem; color: #6b7280;">
                        ${new Date(data.timestamp).toLocaleTimeString()}
                    </div>
                </div>
                <span class="badge badge-${data.status}">${data.status}</span>
            `;
            
            container.insertBefore(item, container.firstChild);
            
            while (container.children.length > 5) {
                container.removeChild(container.lastChild);
            }
        }
        
        function stopCheckIn() {
            isChecking = false;
            
            if (checkInInterval) {
                clearInterval(checkInInterval);
                checkInInterval = null;
            }
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            
            document.getElementById('statusBadge').textContent = 'Ready';
            document.getElementById('statusBadge').className = 'badge badge-present';
            document.getElementById('matchStatus').textContent = 'Waiting for face...';
        }
        
        window.addEventListener('beforeunload', stopCheckIn);
    </script>
</body>
</html>
