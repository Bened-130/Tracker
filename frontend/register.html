<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student - SchoolVibe AI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <div class="nav-logo">📚</div>
                <div>
                    <div class="nav-title">SchoolVibe AI</div>
                    <div class="nav-subtitle">Smart Attendance Tracker</div>
                </div>
            </a>
            
            <button class="mobile-menu-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li><a href="register.html" class="nav-link active">Register</a></li>
                <li><a href="checkin.html" class="nav-link">Check-in</a></li>
                <li><a href="reports.html" class="nav-link">Reports</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Student Registration</h1>
            <p class="page-description">Enroll new students with facial recognition</p>
        </div>

        <div class="grid-2">
            <div class="card">
                <h2 class="card-title">Student Information</h2>
                
                <form id="registrationForm">
                    <div class="form-group">
                        <label class="form-label">First Name *</label>
                        <input type="text" id="firstName" class="form-input" placeholder="John" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Last Name *</label>
                        <input type="text" id="lastName" class="form-input" placeholder="Doe" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" id="email" class="form-input" placeholder="john.doe@school.edu" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Class</label>
                        <select id="classId" class="form-select class-select">
                            <option value="">Select a class</option>
                        </select>
                    </div>
                </form>
            </div>

            <div class="card">
                <h2 class="card-title">📷 Face Capture</h2>
                <p style="color: #6b7280; font-size: 0.875rem; margin-bottom: 1rem;">
                    Capture 5 photos from different angles for accurate recognition
                </p>
                
                <div class="camera-container" style="margin-bottom: 1rem;">
                    <video id="video" class="camera-video" autoplay playsinline></video>
                    <canvas id="overlay" class="camera-overlay"></canvas>
                    <div class="scan-line" id="scanLine" style="display: none;"></div>
                    
                    <div class="camera-controls">
                        <span class="camera-badge" id="captureCount">0 / 5 captured</span>
                        <span class="camera-badge" id="cameraStatus">Ready</span>
                    </div>
                </div>
                
                <div id="photoThumbnails" style="display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap;"></div>
                
                <div style="display: flex; gap: 0.75rem;">
                    <button type="button" id="startCameraBtn" class="btn btn-secondary" onclick="startCamera()">
                        Start Camera
                    </button>
                    <button type="button" id="captureBtn" class="btn btn-primary" onclick="capturePhoto()" disabled>
                        Capture Photo
                    </button>
                </div>
            </div>
        </div>

        <div class="card" style="text-align: right;">
            <button type="button" id="submitBtn" class="btn btn-success" onclick="submitRegistration()" disabled>
                Complete Registration
            </button>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/faceRecognition.js"></script>
    
    <script>
        let stream = null;
        let capturedDescriptors = [];
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' },
                    audio: false
                });
                
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    document.getElementById('captureBtn').disabled = false;
                    document.getElementById('cameraStatus').textContent = 'Camera active';
                    document.getElementById('scanLine').style.display = 'block';
                    showToast('Camera started', 'success');
                };
                
            } catch (error) {
                console.error('Camera error:', error);
                showToast('Camera access denied', 'error');
            }
        }
        
        async function capturePhoto() {
            if (!stream) return;
            
            const detection = await faceService.detectFace(video);
            
            if (!detection) {
                showToast('No face detected. Please position your face in the frame.', 'warning');
                return;
            }
            
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            faceService.drawDetection(overlay, detection, `Photo ${capturedDescriptors.length + 1}`);
            
            capturedDescriptors.push(Array.from(detection.descriptor));
            
            const thumbUrl = faceService.createThumbnail(video, 80);
            const thumbDiv = document.createElement('div');
            thumbDiv.innerHTML = `<img src="${thumbUrl}" style="width: 80px; height: 80px; border-radius: 8px; border: 2px solid #4f46e5;">`;
            document.getElementById('photoThumbnails').appendChild(thumbDiv);
            
            document.getElementById('captureCount').textContent = `${capturedDescriptors.length} / 5 captured`;
            
            if (capturedDescriptors.length >= 5) {
                document.getElementById('submitBtn').disabled = false;
                showToast('All photos captured! Ready to submit.', 'success');
            } else {
                showToast(`Photo ${capturedDescriptors.length} captured. Need ${5 - capturedDescriptors.length} more.`, 'info');
            }
            
            const flash = document.createElement('div');
            flash.style.cssText = 'position: absolute; inset: 0; background: white; opacity: 0.5; pointer-events: none;';
            video.parentElement.appendChild(flash);
            setTimeout(() => flash.remove(), 100);
        }
        
        async function submitRegistration() {
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const classId = document.getElementById('classId').value;
            
            if (!firstName || !lastName || !email) {
                showToast('Please fill in all required fields', 'error');
                return;
            }
            
            if (capturedDescriptors.length < 5) {
                showToast('Please capture at least 5 photos', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';
            
            try {
                const response = await api.registerStudent({
                    first_name: firstName,
                    last_name: lastName,
                    email: email,
                    class_id: classId || null,
                    face_descriptors: capturedDescriptors
                });
                
                showToast('Student registered successfully!', 'success');
                
                document.getElementById('registrationForm').reset();
                capturedDescriptors = [];
                document.getElementById('photoThumbnails').innerHTML = '';
                document.getElementById('captureCount').textContent = '0 / 5 captured';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Complete Registration';
                
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                
            } catch (error) {
                showToast('Registration failed: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Complete Registration';
            }
        }
        
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
