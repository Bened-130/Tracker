<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in - BENEDICT ACADEMY</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-blue-network-of-connections-29358-large.mp4" type="video/mp4">
    </video>
    <div class="fixed inset-0 grid-bg pointer-events-none z-0"></div>

    <nav class="glass-strong sticky top-0 z-40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="scan-face" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold gradient-text">BENEDICT ACADEMY</h1>
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="nav-btn glass px-4 py-2 rounded-lg hover:bg-white/10 text-sm font-medium">Dashboard</a>
                <a href="register.html" class="nav-btn glass px-4 py-2 rounded-lg hover:bg-white/10 text-sm font-medium">Register</a>
                <a href="checkin.html" class="nav-btn glass px-4 py-2 rounded-lg bg-indigo-600/30 text-sm font-medium">Check-in</a>
                <a href="reports.html" class="nav-btn glass px-4 py-2 rounded-lg hover:bg-white/10 text-sm font-medium">Reports</a>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 glass-card rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h2 class="text-2xl font-bold gradient-text">Face Verification</h2>
                        <p class="text-gray-400 text-sm">Position your face in the frame for attendance</p>
                    </div>
                    <div class="glass px-4 py-2 rounded-full flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-sm font-medium">Live</span>
                    </div>
                </div>
                
                <div class="relative rounded-2xl overflow-hidden bg-black/50 aspect-video border-2 border-indigo-500/30 shadow-2xl">
                    <video id="checkinVideo" class="w-full h-full object-cover" autoplay muted playsinline></video>
                    <canvas id="checkinCanvas" class="absolute inset-0 w-full h-full"></canvas>
                    <div class="scan-line"></div>
                    <div id="detectionOverlays" class="absolute inset-0 pointer-events-none"></div>
                    
                    <div id="maskWarning" class="absolute top-4 left-1/2 transform -translate-x-1/2 glass-strong px-6 py-3 rounded-full hidden">
                        <div class="flex items-center gap-2 text-yellow-400">
                            <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                            <span class="font-medium">Mask detected - Please remove for verification</span>
                        </div>
                    </div>
                    
                    <div id="verificationResult" class="absolute bottom-8 left-1/2 transform -translate-x-1/2 hidden">
                        <div class="glass-strong px-8 py-4 rounded-2xl flex items-center gap-4">
                            <div id="resultIcon" class="w-12 h-12 rounded-full flex items-center justify-center"></div>
                            <div>
                                <div id="resultText" class="font-bold text-lg"></div>
                                <div id="resultSubtext" class="text-sm text-gray-400"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div id="checkinLoading" class="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden">
                        <div class="text-center">
                            <div class="loading-spinner mx-auto mb-4"></div>
                            <p class="text-indigo-400 font-medium">Processing...</p>
                        </div>
                    </div>
                </div>
                
                <div class="mt-6 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="startCheckinCamera()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 px-6 rounded-xl transition-all flex items-center gap-2">
                            <i data-lucide="video" class="w-5 h-5"></i>
                            Start Camera
                        </button>
                        <button onclick="stopCheckinCamera()" class="glass hover:bg-white/10 text-white font-semibold py-3 px-6 rounded-xl transition-all flex items-center gap-2">
                            <i data-lucide="video-off" class="w-5 h-5"></i>
                            Stop
                        </button>
                    </div>
                    <div class="text-sm text-gray-400">
                        Threshold: <span class="text-indigo-400 font-mono">0.6</span> Euclidean distance
                    </div>
                </div>
            </div>
            
            <div class="space-y-6">
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <i data-lucide="settings" class="w-5 h-5 text-indigo-400"></i>
                        Session Settings
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Select Class</label>
                            <select id="checkinClass" class="w-full glass bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                                <option value="">Select Class</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Session Date</label>
                            <input type="date" id="checkinDate" class="w-full glass bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                        </div>
                    </div>
                </div>
                
                <div class="glass-card rounded-2xl p-6">
                    <h3 class="text-lg font-semibold mb-4">Recent Verifications</h3>
                    <div id="recentVerifications" class="space-y-3 max-h-64 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-3"></div>

    <script src="../js/api.js"></script>
    <script src="../js/faceRecognition.js"></script>
    <script src="../js/camera.js"></script>
    <script src="../js/checkin.js"></script>
    <script>
        lucide.createIcons();
        document.getElementById('checkinDate').valueAsDate = new Date();
    </script>
</body>
</html>
