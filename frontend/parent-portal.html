<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal - SchoolVibe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --dark-900: #111827;
            --dark-800: #1f2937;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-900) 0%, #1a1a2e 100%);
            color: var(--white);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--white);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-link {
            color: #9ca3af;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: none;
            color: #9ca3af;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .chat-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
            padding: 2rem;
            max-width: 800px;
        }

        .messages {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 1rem;
            border-radius: 1rem;
            max-width: 70%;
        }

        .message.sent {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            align-self: flex-end;
        }

        .message.received {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-start;
        }

        .input-group {
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--white);
            font-size: 1rem;
        }

        input[type="text"]::placeholder {
            color: #9ca3af;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">SchoolVibe</a>
            <ul class="nav-links">
                <li><a href="parent-portal.html" class="nav-link active">Portal</a></li>
                <li><a href="index.html" class="nav-link">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="main-container">
        <div class="header">
            <h1>Parent Portal</h1>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="child-grades">Child's Grades</button>
            <button class="tab" data-tab="communication">Teacher Communication</button>
        </div>

        <!-- Child Grades Tab -->
        <div id="child-grades-tab" class="tab-content">
            <div id="gradesContainer" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem;">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Communication Tab -->
        <div id="communication-tab" class="tab-content" style="display: none;">
            <div class="chat-container">
                <div class="messages" id="messagesContainer">
                    <!-- Messages populated by JS -->
                </div>
                <div class="input-group">
                    <input type="text" id="messageInput" placeholder="Type your message...">
                    <button class="btn" id="sendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
                e.target.classList.add('active');
                const tabName = e.target.dataset.tab;
                document.getElementById(`${tabName}-tab`).style.display = 'block';
            });
        });

        // Load child grades
        async function loadChildGrades() {
            try {
                const res = await fetch('/api/parent/child/results');
                const results = await res.json();
                const container = document.getElementById('gradesContainer');
                
                container.innerHTML = results.map(r => `
                    <div style="background: rgba(255,255,255,0.1); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.2);">
                        <h3 style="color: #9ca3af; margin-bottom: 0.5rem;">${r.subject}</h3>
                        <div style="font-size: 2rem; font-weight: 700;">${r.grade}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading grades:', error);
            }
        }

        loadChildGrades();
    </script>
</body>
</html>
