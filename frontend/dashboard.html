<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BENEDICT ACADEMY</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <div class="nav-logo">BA</div>
                <div>
                    <div class="nav-title">BENEDICT ACADEMY</div>
                    <div class="nav-subtitle">Smart Attendance Tracker</div>
                </div>
            </a>
            
            <button class="mobile-menu-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
                <li><a href="register.html" class="nav-link">Register</a></li>
                <li><a href="checkin.html" class="nav-link">Check-in</a></li>
                <li><a href="reports.html" class="nav-link">Reports</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Dashboard Overview</h1>
            <p class="page-description">Real-time attendance statistics</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid-4 card-margin-bottom">
            <div class="stat-card">
                <div class="stat-icon stat-icon-inline">👥</div>
                <div class="stat-value" id="totalStudents">-</div>
                <div class="stat-label">Total Students</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon stat-icon-inline green">✓</div>
                <div class="stat-value" id="presentToday">-</div>
                <div class="stat-label">Present Today</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon stat-icon-inline yellow">⏰</div>
                <div class="stat-value" id="lateToday">-</div>
                <div class="stat-label">Late Today</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon stat-icon-inline red">✕</div>
                <div class="stat-value" id="absentToday">-</div>
                <div class="stat-label">Absent Today</div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Recent Check-ins</h2>
                <a href="checkin.html" class="btn btn-primary btn-small-padding">New Check-in</a>
            </div>
            
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Class</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recentActivity">
                        <tr>
                            <td colspan="4" class="table-empty-cell">
                                Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function loadDashboard() {
            try {
                // Load students count
                const students = await api.getStudents();
                document.getElementById('totalStudents').textContent = students.count || 0;
                
                // Load today's attendance from first available session
                const classes = await api.getClasses();
                let totalPresent = 0, totalLate = 0, totalAbsent = 0;
                let recentChecks = [];
                
                for (const cls of classes.data || []) {
                    if (cls.sessions?.length) {
                        const today = new Date().toISOString().split('T')[0];
                        const todaySession = cls.sessions.find(s => s.session_date === today);
                        
                        if (todaySession) {
                            const attendance = await api.getSessionAttendance(todaySession.session_id);
                            const data = attendance.data || [];
                            
                            data.forEach(a => {
                                if (a.status === 'present') totalPresent++;
                                else if (a.status === 'late') totalLate++;
                                else totalAbsent++;
                                
                                recentChecks.push({
                                    name: `${a.students?.first_name || ''} ${a.students?.last_name || ''}`,
                                    class: cls.class_name,
                                    time: a.timestamp,
                                    status: a.status
                                });
                            });
                        }
                    }
                }
                
                document.getElementById('presentToday').textContent = totalPresent;
                document.getElementById('lateToday').textContent = totalLate;
                document.getElementById('absentToday').textContent = totalAbsent;
                
                // Update recent activity table
                const tbody = document.getElementById('recentActivity');
                if (recentChecks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 2rem; color: #6b7280;">No check-ins today</td></tr>';
                } else {
                    tbody.innerHTML = recentChecks.slice(0, 10).map(check => `
                        <tr>
                            <td><strong>${check.name}</strong></td>
                            <td>${check.class}</td>
                            <td>${formatTime(check.time)}</td>
                            <td><span class="badge badge-${check.status}">${check.status}</span></td>
                        </tr>
                    `).join('');
                }
                
            } catch (error) {
                console.error('Dashboard error:', error);
                showToast('Failed to load dashboard data', 'error');
            }
        }
        
        loadDashboard();
    </script>
    <script src="js/login.js"></script>
    <script>
        // Require authentication on this page
        requireAuth();
    </script>
</body>
</html>
