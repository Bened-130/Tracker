<!-- frontend/pages/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Benedict Academy</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-blue-network-of-connections-29358-large.mp4" type="video/mp4">
    </video>
    <div class="fixed inset-0 grid-bg pointer-events-none z-0"></div>

    <nav class="glass-strong sticky top-0 z-40 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center">
                    <i data-lucide="scan-face" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold gradient-text">SchoolVibe AI</h1>
                </div>
            </a>
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="nav-btn glass px-4 py-2 rounded-lg bg-indigo-600/30 text-sm font-medium">Dashboard</a>
                <a href="register.html" class="nav-btn glass px-4 py-2 rounded-lg hover:bg-white/10 text-sm font-medium">Register</a>
                <a href="checkin.html" class="nav-btn glass px-4 py-2 rounded-lg hover:bg-white/10 text-sm font-medium">Check-in</a>
                <a href="reports.html" class="nav-btn glass px-4 py-2 rounded-lg hover:bg-white/10 text-sm font-medium">Reports</a>
            </div>
        </div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto p-6 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-card rounded-2xl p-6 slide-in">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                        <i data-lucide="users" class="w-6 h-6 text-blue-400"></i>
                    </div>
                    <span class="text-2xl font-bold" id="totalStudents">50</span>
                </div>
                <p class="text-gray-400 text-sm">Total Students</p>
            </div>
            
            <div class="glass-card rounded-2xl p-6 slide-in" style="animation-delay: 0.1s">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center">
                        <i data-lucide="check-circle" class="w-6 h-6 text-green-400"></i>
                    </div>
                    <span class="text-2xl font-bold" id="todayPresent">42</span>
                </div>
                <p class="text-gray-400 text-sm">Present Today</p>
            </div>
            
            <div class="glass-card rounded-2xl p-6 slide-in" style="animation-delay: 0.2s">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-yellow-500/20 rounded-xl flex items-center justify-center">
                        <i data-lucide="clock" class="w-6 h-6 text-yellow-400"></i>
                    </div>
                    <span class="text-2xl font-bold" id="todayLate">3</span>
                </div>
                <p class="text-gray-400 text-sm">Late Arrivals</p>
            </div>
            
            <div class="glass-card rounded-2xl p-6 slide-in" style="animation-delay: 0.3s">
                <div class="flex items-center justify-between mb-4">
                    <div class="w-12 h-12 bg-red-500/20 rounded-xl flex items-center justify-center">
                        <i data-lucide="x-circle" class="w-6 h-6 text-red-400"></i>
                    </div>
                    <span class="text-2xl font-bold" id="todayAbsent">5</span>
                </div>
                <p class="text-gray-400 text-sm">Absent</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="activity" class="w-5 h-5 text-indigo-400"></i>
                    Real-time Activity
                </h3>
                <div id="activityFeed" class="space-y-3 max-h-96 overflow-y-auto">
                    <!-- Activity items -->
                </div>
            </div>
            
            <div class="glass-card rounded-2xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-400"></i>
                    Class Overview
                </h3>
                <canvas id="classChart" class="w-full h-64"></canvas>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 space-y-3"></div>

    <script src="../js/api.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
