<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Benedict Academy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <div class="nav-logo">📚</div>
                <div>
                    <div class="nav-title">Benedict Academy</div>
                    <div class="nav-subtitle">Smart Attendance Tracker</div>
                </div>
            </a>
            
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
                <li><a href="register.html" class="nav-link">Register</a></li>
                <li><a href="checkin.html" class="nav-link">Check-in</a></li>
                <li><a href="reports.html" class="nav-link">Reports</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        <div class="page-header">
            <h1 class="page-title">Dashboard</h1>
            <p class="page-description">Real-time attendance overview</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">👥</div>
                <div class="stat-content">
                    <div class="stat-value" id="totalStudents">--</div>
                    <div class="stat-label">Total Students</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon green">✓</div>
                <div class="stat-content">
                    <div class="stat-value" id="presentToday">--</div>
                    <div class="stat-label">Present Today</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon yellow">⏰</div>
                <div class="stat-content">
                    <div class="stat-value" id="lateToday">--</div>
                    <div class="stat-label">Late Arrivals</div>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon red">✕</div>
                <div class="stat-content">
                    <div class="stat-value" id="absentToday">--</div>
                    <div class="stat-label">Absent</div>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">🕐 Recent Activity</h2>
                <span class="badge badge-present" id="liveIndicator">● Live</span>
            </div>
            <div id="activityList" style="display: flex; flex-direction: column; gap: 0.75rem;">
                <p style="color: #6b7280; text-align: center; padding: 2rem;">
                    Loading activity...
                </p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Load dashboard data
        async function loadDashboard() {
            try {
                // Get students count
                const studentsRes = await api.getStudents({ limit: 1 });
                document.getElementById('totalStudents').textContent = studentsRes.count || 0;
                
                // Simulate other stats (replace with real API calls)
                document.getElementById('presentToday').textContent = '42';
                document.getElementById('lateToday').textContent = '3';
                document.getElementById('absentToday').textContent = '5';
                
                // Load recent activity
                loadActivity();
                
            } catch (error) {
                console.error('Failed to load dashboard:', error);
            }
        }
        
        function loadActivity() {
            const activities = [
                { name: 'Alice Johnson', action: 'checked in', time: '2 min ago', status: 'present' },
                { name: 'Bob Smith', action: 'was marked late', time: '5 min ago', status: 'late' },
                { name: 'Carol White', action: 'checked in', time: '8 min ago', status: 'present' },
                { name: 'David Brown', action: 'checked in', time: '12 min ago', status: 'present' }
            ];
            
            const container = document.getElementById('activityList');
            container.innerHTML = activities.map(act => `
                <div style="display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: #f9fafb; border-radius: 0.5rem;">
                    <div style="width: 40px; height: 40px; background: #e5e7eb; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        👤
                    </div>
                    <div style="flex: 1;">
                        <div style="font-weight: 500;">${act.name} <span style="color: #6b7280; font-weight: 400;">${act.action}</span></div>
                        <div style="font-size: 0.75rem; color: #9ca3af;">${act.time}</div>
                    </div>
                    <span class="badge badge-${act.status}">${act.status}</span>
                </div>
            `).join('');
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
