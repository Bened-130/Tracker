[build]
  functions = "netlify/functions"
  publish = "frontend"

[dev]
  functions = "netlify/functions"
  publish = "frontend"
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"